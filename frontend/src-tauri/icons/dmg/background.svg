<svg xmlns="http://www.w3.org/2000/svg" width="660" height="400" viewBox="0 0 660 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="660" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E8E0F5"/>
      <stop offset="0.35" stop-color="#F0E4F0"/>
      <stop offset="0.65" stop-color="#F5E4E6"/>
      <stop offset="1" stop-color="#F6E8DA"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7A64C8"/>
      <stop offset="1" stop-color="#D8567A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="60"/>
    </filter>
    <filter id="arrowGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5"/>
    </filter>
  </defs>

  <rect width="660" height="400" fill="url(#bg)"/>

  <ellipse cx="165" cy="175" rx="180" ry="150" fill="#B8A1E8" opacity="0.18" filter="url(#glow)"/>
  <ellipse cx="495" cy="175" rx="170" ry="140" fill="#F06A8B" opacity="0.10" filter="url(#glow)"/>
  <ellipse cx="330" cy="350" rx="250" ry="80" fill="#FFB38A" opacity="0.12" filter="url(#glow)"/>

  <line x1="255" y1="170" x2="398" y2="170" stroke="url(#arrowGrad)" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
  <line x1="255" y1="170" x2="398" y2="170" stroke="#7A64C8" stroke-width="10" stroke-linecap="round" opacity="0.08" filter="url(#arrowGlow)"/>
  <polygon points="401,170 389,161 389,179" fill="url(#arrowGrad)" opacity="0.45"/>

  <text x="330" y="210" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif" font-size="11" font-weight="400" fill="#6A5ACF" opacity="0.55" letter-spacing="0.3">Drag to Applications to install</text>
</svg>
